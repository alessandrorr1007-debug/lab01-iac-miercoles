<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lab IaC</title>
</head>
<body>

  <h1>Frontend funcionando correctamente</h1>

  <button onclick="probar()">Probar Backend</button>

  <div id="resultado"></div>

  <script>
    async function probar() {
      try {
        const res = await fetch('/api/saludo');
        const data = await res.json();

        document.getElementById('resultado').innerText =
          JSON.stringify(data, null, 2);

      } catch (error) {
        document.getElementById('resultado').innerText =
          "Error conectando con backend";
      }
    }
  </script>

</body>
</html>
